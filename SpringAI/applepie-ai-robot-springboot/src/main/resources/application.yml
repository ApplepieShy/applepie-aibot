server:
  port: 8080
spring:
  cassandra:
    contact-points: 127.0.0.1 # Cassandra 集群节点地址（可配置多个，用逗号分隔）
    port: 9042 # 端口号
    local-datacenter: datacenter1 # 必须与集群配置的数据中心名称一致（大小写敏感）
  ai:
    chat:
      memory:
        repository:
          cassandra:
            keyspace: applepie_ai_robot # 指定存储聊天记忆的 Keyspace（类似数据库名）
            table: applepie_ai_chat_memory # 表名
            time-to-live: 1095d # 数据的自动过期时间（1095天 ≈ 3年）
            initialize-schema: true  # 自动初始化表结构
    deepseek:
      api-key: sk-854810f1fb1545da8d7678831c00e7e5
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
    ollama:
      base-url: http://localhost:11434 # Ollama 服务的访问地址, 11434 端口是 Ollama 默认的启动端口
      chat:
        options: # 模型参数
          model: qwen3:latest # 指定 Ollama 使用的大模型名称，根据你实际安装的来，我运行的是 14b
          temperature: 0.7 # 温度值
    zhipuai:
      base-url: https://open.bigmodel.cn/api/paas # 智谱 AI 的请求 URL, 可不填，默认值为 open.bigmodel.cn/api/paas
      api-key: 8f1d141bc2774b31ba221ad02109e29e.UtPxt0yU9Faxm5ia # 填写智谱 AI 的 API Key, 该成你自己的
      chat:
        options: # 模型参数
          model: glm-4-air # 模型名称，使用智谱 AI 哪个模型
          temperature: 0.7 # 温度值
    openai:
#      base-url: https://api.zhizengzeng.com/v1 # OpenAI 服务的访问地址，这里使用的第三方代理商：智增增
      base-url: https://dashscope.aliyuncs.com/compatible-mode # OpenAI 服务的访问地址，这里使用的是阿里云百炼
#      api-key: sk-zk2d6f272b3ce213a41af7f959641547cdb6a21918d0af6f  # 填写智增增的 API Key, 该成你自己的
      api-key: sk-fb4fd1ef45364f78aa89d300006f5a3d  # 填写阿里云百炼的 API Key, 该成你自己的
      chat:
        options:
          model: qwen-omni-turbo # 模型名称
          temperature: 0.7 # 温度值
logging:
  level:
    org.springframework.ai.chat.client.advisor: debug
    com.applepie.ai.robot.advisor: debug
